name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # ✅ updated

    - name: Setup Python
      uses: actions/setup-python@v5   # ✅ updated
      with:
        python-version: "3.10"

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Run backend check
      run: |
        cd backend
        python -c "import app.main"